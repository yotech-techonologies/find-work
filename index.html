<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Finder - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <h1>Work Finder</h1>
      <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h2>Find Your Dream Job Today</h2>
    <p>Connecting talent with opportunity worldwide.</p>
    <!-- Button now disabled until registration -->
    <a href="jobs.html" id="jobsLink" class="btn">Browse Jobs</a>
  </section>

  <!-- Registration Form -->
  <section class="content">
    <h2>Register to Access Jobs</h2>
    <form id="registerForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" required>

      <label for="role">I want to:</label>
      <select id="role" required>
        <option value="">-- Select --</option>
        <option value="find">Find Work</option>
        <option value="post">Post Work</option>
      </select>

      <button type="submit">Register</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Work Finder. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
